{% extends "system_base.html" %}
{% block title %}Change Password{% endblock %}
{% block system_content %}
  <h1>Change Password</h1>
  {% if forced %}
    <p class="muted">You're using a temporary password. Choose a new one to continue.</p>
  {% endif %}
  <form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Current Password</label>
    <input type="password" name="current_password" required>
    <label>New Password</label>
    <input type="password" name="new_password" required minlength="12">
    <label>Confirm New Password</label>
    <input type="password" name="confirm_password" required minlength="12">
    <button type="submit">Update Password</button>
  </form>
{% endblock %}
