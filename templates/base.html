<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Work-A-Beez{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo-workabee.svg') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
  <link rel="alternate icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a href="{{ url_for('clock_home') }}" class="site-header-brand">
      <img src="{{ url_for('static', filename='logo-workabee.svg') }}" alt="Work-A-Beez">
      <span class="site-header-brand-name">Work-A-Beez</span>
    </a>
  </header>

  <div class="wrap {% block wrapclass %}{% endblock %}">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <img src="{{ url_for('static', filename='logo-workabee.svg') }}" alt="Work-A-Beez">
      <div>
        <div class="site-footer-brand-name">Work-A-Beez</div>
        <p class="site-footer-tagline">Simple time tracking for hardworking teams.</p>
      </div>
    </div>
    <p class="site-footer-copyright">&copy; 2026 Work-A-Beez. All Rights Reserved.</p>
  </footer>
</body>
</html>
