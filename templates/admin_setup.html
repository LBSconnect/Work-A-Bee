{% extends "base.html" %}
{% block title %}Create Admin Account{% endblock %}
{% block content %}
  <h1>Create your admin account</h1>
  <p class="muted">Create the first admin login for your organization. Your Company Code was provided when your organization was set up.</p>
  <form method="post">
    <label>Company Code</label>
    <input type="text" name="company_code" value="{{ company_code or '' }}" autofocus required>
    <label>Username</label>
    <input type="text" name="username" required>
    <label>Password</label>
    <input type="password" name="password" required minlength="8">
    <label>Confirm password</label>
    <input type="password" name="confirm_password" required minlength="8">
    <button type="submit">Create account</button>
  </form>
{% endblock %}
