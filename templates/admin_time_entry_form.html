{% extends "admin_base.html" %}
{% block title %}Add Manual Time Entry{% endblock %}
{% block admin_content %}
  <h1>Add manual time entry</h1>
  <p class="muted">For {{ employee.name }} ({{ employee.employee_code }}) - use this if they forgot to clock in or out.</p>

  <form method="post">
    <label>Clock in</label>
    <input type="datetime-local" name="clock_in" required>

    <label>Clock out (leave blank if still clocked in)</label>
    <input type="datetime-local" name="clock_out">

    <button type="submit">Add entry</button>
  </form>
  <p class="muted" style="margin-top:24px;"><a href="{{ url_for('admin_employees') }}">Cancel</a></p>
{% endblock %}
