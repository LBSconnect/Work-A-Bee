{% extends "base.html" %}
{% block title %}System Admin Login{% endblock %}
{% block head_extra %}<meta name="robots" content="noindex, nofollow, noarchive">{% endblock %}
{% block content %}
  <h1>System Admin Login</h1>
  <p class="muted">Platform-wide access across all tenants. Not a customer login.</p>
  <form method="post">
    <label>Username</label>
    <input type="text" name="username" autofocus required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Log in</button>
  </form>
{% endblock %}
