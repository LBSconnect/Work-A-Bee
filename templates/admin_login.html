{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
  <h1>Admin login</h1>
  <form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Company</label>
    <select name="company_code" autofocus required>
      <option value="" disabled selected>Select your company&hellip;</option>
      {% for c in companies %}
        <option value="{{ c.company_code }}">{{ c.name }}</option>
      {% endfor %}
    </select>
    <label>Username</label>
    <input type="text" name="username" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Log in</button>
  </form>
  <p class="muted" style="margin-top:24px;"><a href="{{ url_for('staff_login') }}">Back to clock in/out</a></p>
{% endblock %}
