databases:
  - name: linton-timekeeping-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: linton-timekeeping
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: REPORT_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: linton-timekeeping-db
          property: connectionString
      - key: PAY_PERIOD_ANCHOR
        value: "2026-07-03"
      - key: REPORT_HOUR
        value: "14"
      - key: REPORT_MINUTE
        value: "0"
      - key: SMTP_SERVER
        value: "smtp.office365.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_RECIPIENT
        sync: false
