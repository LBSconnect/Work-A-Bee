"""
Builds and sends the biweekly payroll report email.

SMTP credentials come from .env (never hardcoded, never sent anywhere
except directly to your mail provider to authenticate).
"""
import smtplib
from email.mime.multipart import MIMEMultipart
from email.mime.text import MIMEText

import config


def build_report_html(period_start, period_end, payroll_rows):
    total_pay = sum(r["pay"] for r in payroll_rows)
    total_hours = sum(r["total_hours"] for r in payroll_rows)

    rows_html = ""
    for r in payroll_rows:
        flag = " &#9888; open entry excluded" if r["incomplete"] else ""
        rows_html += (
            f"<tr>"
            f"<td>{r['employee_code']}</td>"
            f"<td>{r['name']}</td>"
            f"<td>{r['worker_type'].title()}</td>"
            f"<td style='text-align:right;'>{r['total_hours']:.2f}</td>"
            f"<td style='text-align:right;'>${r['hourly_rate']:.2f}</td>"
            f"<td style='text-align:right;'>${r['pay']:.2f}</td>"
            f"<td style='color:#b45309;'>{flag}</td>"
            f"</tr>"
        )

    return f"""
    <html><body style="font-family: Arial, sans-serif;">
      <h2>Linton Business Solutions — Payroll Report</h2>
      <p>Pay period: <strong>{period_start.strftime('%B %d, %Y')} – {period_end.strftime('%B %d, %Y')}</strong></p>
      <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse; min-width:600px;">
        <tr style="background:#f3f4f6;">
          <th>Employee ID</th><th>Name</th><th>Type</th>
          <th>Hours</th><th>Rate</th><th>Pay</th><th></th>
        </tr>
        {rows_html}
        <tr style="font-weight:bold; background:#f9fafb;">
          <td colspan="3">Total</td>
          <td style="text-align:right;">{total_hours:.2f}</td>
          <td></td>
          <td style="text-align:right;">${total_pay:.2f}</td>
          <td></td>
        </tr>
      </table>
      <p style="color:#6b7280; font-size:12px;">
        Generated automatically by the Linton Timekeeping app.
      </p>
    </body></html>
    """


def send_report_email(period_start, period_end, payroll_rows):
    if not config.SMTP_USERNAME or not config.SMTP_PASSWORD:
        raise RuntimeError(
            "Email is not configured yet. Fill in SMTP_USERNAME and SMTP_PASSWORD in your .env file."
        )
    if not config.REPORT_RECIPIENT:
        raise RuntimeError("No REPORT_RECIPIENT set in .env.")

    html = build_report_html(period_start, period_end, payroll_rows)

    msg = MIMEMultipart("alternative")
    msg["Subject"] = (
        f"Payroll Report {period_start.strftime('%m/%d')}"
        f"–{period_end.strftime('%m/%d/%Y')}"
    )
    msg["From"] = config.SMTP_USERNAME
    msg["To"] = config.REPORT_RECIPIENT
    msg.attach(MIMEText(html, "html"))

    with smtplib.SMTP(config.SMTP_SERVER, config.SMTP_PORT, timeout=30) as server:
        server.starttls()
        server.login(config.SMTP_USERNAME, config.SMTP_PASSWORD)
        server.sendmail(config.SMTP_USERNAME, [config.REPORT_RECIPIENT], msg.as_string())
