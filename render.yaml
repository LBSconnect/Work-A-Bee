databases:
  - name: time-keeper-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: time-keeper
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: REPORT_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: time-keeper-db
          property: connectionString
      - key: REPORT_HOUR
        value: "17"
      - key: REPORT_MINUTE
        value: "0"
      - key: DEFAULT_HOURLY_RATE
        value: "16.00"
      - key: SMTP_SERVER
        value: "smtp.office365.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_RECIPIENT
        value: "info@lbsconnect.net"
