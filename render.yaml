databases:
  - name: time-keeper-db
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  - type: web
    name: time-keeper
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: time-keeper-db
          property: connectionString
      - key: REPORT_HOUR
        value: "17"
      - key: REPORT_MINUTE
        value: "0"
      - key: DEFAULT_HOURLY_RATE
        value: "16.00"
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_SENDER_EMAIL
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
      - key: REPORT_RECIPIENT
        value: "info@lbsconnect.net"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: SYSTEM_SETUP_TOKEN
        sync: false
