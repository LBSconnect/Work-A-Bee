name: Send weekly hours report

on:
  schedule:
    - cron: "0 22 * * 5"  # 5pm Central Daylight Time (summer, UTC-5)
    - cron: "0 23 * * 5"  # 5pm Central Standard Time (winter, UTC-6)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call the report endpoint
        run: |
          curl -sS -f "${{ secrets.APP_URL }}/cron/send-report?token=${{ secrets.REPORT_TOKEN }}"
