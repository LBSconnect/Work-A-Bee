name: Send weekly hours reports

on:
  schedule:
    # Hourly - each org's own timezone/weekday/hour settings (in the
    # organizations table) decide whether a report actually goes out on a
    # given ping. This also doubles as a keep-warm ping for the free-tier
    # web service.
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call the report endpoint
        run: |
          curl -sS -f "${{ secrets.APP_URL }}/cron/send-report?token=${{ secrets.REPORT_TOKEN }}"
